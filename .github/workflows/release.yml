name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: vacuum

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Read crate version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('Cargo.toml').read_text())['package']['version'])")
          if [[ -z "$VERSION" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Validate tag matches Cargo.toml version
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.release_tag }}"
          VERSION="${{ steps.version.outputs.release_version }}"
          if [[ "${TAG#v}" != "$VERSION" ]]; then
            echo "Tag '$TAG' does not match Cargo.toml version '$VERSION'" >&2
            exit 1
          fi

  verify:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        run: cargo test
      - name: Smoke doctor surface
        run: |
          cargo run --locked -- doctor health
          cargo run --locked -- doctor capabilities --json
          cargo run --locked -- doctor robot-docs
          cargo run --locked -- doctor --robot-triage

  build:
    needs:
      - validate-version
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_ext: tar.gz
            use_cross: false
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_ext: tar.gz
            use_cross: true
          - runner: macos-15
            target: x86_64-apple-darwin
            artifact_ext: tar.gz
            use_cross: false
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_ext: tar.gz
            use_cross: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_ext: zip
            use_cross: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install cross for aarch64 Linux build
        if: matrix.use_cross
        shell: bash
        run: cargo install cross --locked
      - name: Build binary
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          TAG="${{ needs.validate-version.outputs.release_tag }}"
          TARGET="${{ matrix.target }}"
          ARTIFACT="vacuum-${TAG}-${TARGET}"

          STAGING="staging-${TARGET}"
          mkdir -p "$STAGING"

          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/$TARGET/release/${BIN_NAME}.exe" "$STAGING/"
            7z a "dist/${ARTIFACT}.zip" "./$STAGING/*" >/dev/null
          else
            cp "target/$TARGET/release/${BIN_NAME}" "$STAGING/"
            cp scripts/s3-to-vacuum "$STAGING/"
            tar -C "$STAGING" -czf "dist/${ARTIFACT}.tar.gz" "${BIN_NAME}" s3-to-vacuum
          fi
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action/download-syft@v0
      - name: Write SPDX SBOM file
        shell: bash
        run: |
          syft "dir:${{ github.workspace }}" -o spdx-json > "dist/vacuum-${{ matrix.target }}.spdx.json"
      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    needs:
      - validate-version
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.spdx.json" \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/**/*.tar.gz
            release/**/*.zip
            release/**/*.spdx.json
            release/SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.release_tag }}
          body: |
            This release packages `${{ needs.validate-version.outputs.release_tag }}` for all supported targets.

            ## Verification

            ```bash
            sha256sum -c SHA256SUMS
            ```
          generate_release_notes: true
          files: |
            release/**/*.tar.gz
            release/**/*.zip
            release/**/*.spdx.json
            release/SHA256SUMS

  update-homebrew:
    name: Update Homebrew tap
    needs:
      - validate-version
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download SHA256SUMS from release
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.release_tag }}"
          curl -fsSL "https://github.com/cmdrvl/vacuum/releases/download/${version}/SHA256SUMS" -o SHA256SUMS

      - name: Generate formula
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.release_tag }}"
          bare_version="${{ needs.validate-version.outputs.release_version }}"

          export VACUUM_VERSION="${version}"
          export VACUUM_BARE_VERSION="${bare_version}"
          export SHA256_AARCH64_APPLE_DARWIN="$(awk '/vacuum-'"${version}"'-aarch64-apple-darwin.tar.gz$/ { print $1 }' SHA256SUMS)"
          export SHA256_X86_64_APPLE_DARWIN="$(awk '/vacuum-'"${version}"'-x86_64-apple-darwin.tar.gz$/ { print $1 }' SHA256SUMS)"
          export SHA256_AARCH64_UNKNOWN_LINUX_GNU="$(awk '/vacuum-'"${version}"'-aarch64-unknown-linux-gnu.tar.gz$/ { print $1 }' SHA256SUMS)"
          export SHA256_X86_64_UNKNOWN_LINUX_GNU="$(awk '/vacuum-'"${version}"'-x86_64-unknown-linux-gnu.tar.gz$/ { print $1 }' SHA256SUMS)"

          python3 -c '
          import os
          import textwrap
          from pathlib import Path

          checksums = {
              "SHA256_AARCH64_APPLE_DARWIN": os.environ["SHA256_AARCH64_APPLE_DARWIN"],
              "SHA256_X86_64_APPLE_DARWIN": os.environ["SHA256_X86_64_APPLE_DARWIN"],
              "SHA256_AARCH64_UNKNOWN_LINUX_GNU": os.environ["SHA256_AARCH64_UNKNOWN_LINUX_GNU"],
              "SHA256_X86_64_UNKNOWN_LINUX_GNU": os.environ["SHA256_X86_64_UNKNOWN_LINUX_GNU"],
          }
          for name, value in checksums.items():
              if not value:
                  raise SystemExit(f"missing checksum for {name}")

          version = os.environ["VACUUM_VERSION"]
          bare_version = os.environ["VACUUM_BARE_VERSION"]
          formula = f"""# typed: false
          # frozen_string_literal: true

          class Vacuum < Formula
            desc "Inventory artifacts into deterministic JSONL manifests"
            homepage "https://github.com/cmdrvl/vacuum"
            version "{bare_version}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/cmdrvl/vacuum/releases/download/{version}/vacuum-{version}-aarch64-apple-darwin.tar.gz"
                sha256 "{checksums["SHA256_AARCH64_APPLE_DARWIN"]}"
              end
              on_intel do
                url "https://github.com/cmdrvl/vacuum/releases/download/{version}/vacuum-{version}-x86_64-apple-darwin.tar.gz"
                sha256 "{checksums["SHA256_X86_64_APPLE_DARWIN"]}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/cmdrvl/vacuum/releases/download/{version}/vacuum-{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "{checksums["SHA256_AARCH64_UNKNOWN_LINUX_GNU"]}"
              end
              on_intel do
                url "https://github.com/cmdrvl/vacuum/releases/download/{version}/vacuum-{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "{checksums["SHA256_X86_64_UNKNOWN_LINUX_GNU"]}"
              end
            end

            def install
              bin.install "vacuum"
              bin.install "s3-to-vacuum"
            end

            test do
              assert_match version.to_s, shell_output("#{{bin}}/vacuum --version")
            end
          end
          """
          Path("vacuum.rb").write_text(textwrap.dedent(formula).lstrip())
          '

      - name: Warn when Homebrew tap token is missing
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: echo "::warning::HOMEBREW_TAP_TOKEN is not set; skipping cmdrvl/homebrew-tap update."

      - name: Push formula to tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.release_tag }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/cmdrvl/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp vacuum.rb tap/Formula/vacuum.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/vacuum.rb

          if git diff --cached --quiet; then
            echo "No changes to formula"
            exit 0
          fi

          git commit -m "vacuum ${version}"
          git push origin HEAD:main
          git push origin HEAD:master
